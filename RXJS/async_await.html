<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/rxjs@7.8.2/dist/bundles/rxjs.umd.min.js"></script>

</head>

<body>
    <script function asyncAdd(a, b) { return new Promise(resolve=>
        {
            setTimeout(() => {
                resolve(a + b);
            }, 300);
        })
        }


        async function addSeries(numbers) {
            let sum = 0;

            for (let num of numbers) {
                sum = await asyncAdd(sum, num);
            }

            return sum;
        }

        // Usage
        addSeries([1234]).then(console.log);
    </script>
</body>

</html>
