<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Products App</title>

    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        /* NAVBAR */
        
        .navbar {
            background: #222;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            position: sticky;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .nav-links a {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
        
        .search-bar input {
            padding: 5px;
            border-radius: 5px;
            border: none;
        }
        
        .hamburger {
            display: none;
            font-size: 22px;
            cursor: pointer;
        }
        /* CARDS */
        
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .card {
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .heart {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 22px;
            cursor: pointer;
        }
        
        .liked {
            color: red;
        }
        
        .not-liked {
            color: gray;
        }
        
        .pagination {
            text-align: center;
            margin: 20px;
        }
        
        .pagination button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
        }
        /* MOBILE */
        
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                background: #333;
                position: absolute;
                top: 60px;
                right: 0;
                width: 150px;
                padding: 10px;
            }
            .nav-links.show {
                display: flex;
            }
            .hamburger {
                display: block;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">

        const { useState, useEffect } = React; function App() { const [products, setProducts] = useState([]); const [currentPage, setCurrentPage] = useState(1); const [liked, setLiked] = useState({}); const [search, setSearch] = useState(""); const [menuOpen,setMenuOpen]
        = useState(false); const productsPerPage = 20; useEffect(() => { fetch("https://dummyjson.com/products?limit=100") .then(res => res.json()) .then(data => setProducts(data.products)); }, []); const handleLike = (id) => { setLiked(prev=> ({ ...prev,
        [id]: !prev[id] }));}; const filteredProducts = products.filter(product => product.title.toLowerCase().includes(search.toLowerCase()) ); const indexOfLast = currentPage * productsPerPage; const indexOfFirst = indexOfLast - productsPerPage; const
        currentProducts = filteredProducts.slice(indexOfFirst, indexOfLast); const totalPages = Math.ceil(filteredProducts.length / productsPerPage); return (
        <div>

            {/* NAVBAR */}
            <div className="navbar">
                <h2>MyShop</h2>

                <div className={`nav-links ${menuOpen ? "show" : ""}`}>
                    <a>Home</a>
                    <a>Cart</a>
                    <a>Contact</a>
                    <div className="search-bar">
                        <input type="text" placeholder="Search..." value={search} onChange={(e)=> { setSearch(e.target.value); setCurrentPage(1); }} />
                    </div>
                </div>

                <div className="hamburger" onClick={()=> setMenuOpen(!menuOpen)}> ☰
                </div>
            </div>

            {/* PRODUCTS */}
            <div className="products">
                {currentProducts.map(product => (
                <div key={product.id} className="card">
                    <span className={`heart ${liked[product.id] ? "liked" : "not-liked"}`} onClick={()=> handleLike(product.id)}
                >
                  ♥
                </span>
                    <img src={product.thumbnail} />
                    <h4>{product.title}</h4>
                    <p>${product.price}</p>
                </div>
                ))}
            </div>

            {/* PAGINATION */}
            <div className="pagination">
                <button onClick={()=> setCurrentPage(prev => prev - 1)} 
              disabled={currentPage === 1}
            >
              Previous
            </button>

                <span> Page {currentPage} of {totalPages} </span>

                <button onClick={()=> setCurrentPage(prev => prev + 1)} 
              disabled={currentPage === totalPages}
            >
              Next
            </button>
            </div>

        </div>
        ); } const root = ReactDOM.createRoot(document.getElementById("root")); root.render(
        <App />);

    </script>
</body>

</html>
