<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Birthday Month Gallery</title>

    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
        }
        
        img {
            width: 320px;
            height: 220px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }
        
        .month {
            font-size: 28px;
            margin-top: 15px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 5px black;
        }
        /* popup */
        
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .popup-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px black;
        }
        
        .popup-box img {
            width: 120px;
            margin-top: 10px;
        }
        
        h2 {
            color: #ff4081;
        }
    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        function MonthGallery(){ const months=[ "January","February","March","April","May","June", "July","August","September","October","November","December" ]; const images=[ "https://picsum.photos/400/300?1", "https://picsum.photos/400/300?2", "https://picsum.photos/400/300?3",
        "https://picsum.photos/400/300?4", "https://picsum.photos/400/300?5", "https://picsum.photos/400/300?6", "https://picsum.photos/400/300?7", "https://picsum.photos/400/300?8", "https://picsum.photos/400/300?9", "https://picsum.photos/400/300?10",
        "https://picsum.photos/400/300?11", "https://picsum.photos/400/300?12" ]; const [index,setIndex] = React.useState(0); const [showPopup,setShowPopup] = React.useState(false); React.useEffect(()=>{ if(index
        < months.length-1){ const timer=s
            etTimeout(()=>{ setIndex(index+1); },1000); return ()=>clearTimeout(timer); }else{ setTimeout(()=>{ setShowPopup(true); },1000); } },[index]); return(

            <div className="container">

                {!showPopup &&

                <div>

                    <img src={images[index]} />

                    <div className="month">
                        {months[index]}
                    </div>

                </div>

                } {showPopup &&

                <div className="popup">

                    <div className="popup-box">

                        <h2>🎉 Happy Birthday 🎂</h2>

                        <p>
                            Wishing you happiness, joy and lots of success!
                        </p>

                        <img src="https://cdn-icons-png.flaticon.com/512/3468/3468379.png" />

                    </div>

                </div>

                }

            </div>

            ); } function App(){ return
            <MonthGallery/>; } const root = ReactDOM.createRoot( document.getElementById("root") ); root.render(

            <App/>);

    </script>

</body>

</html>
