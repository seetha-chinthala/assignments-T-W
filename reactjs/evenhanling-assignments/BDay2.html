<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Birthday Month Gallery</title>

    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background-image: url("https://images.unsplash.com/photo-1513151233558-d860c5398176");
            background-size: cover;
            background-position: center;
            height: 100vh;
        }
        
        .container {
            margin-top: 80px;
        }
        
        img {
            width: 320px;
            height: 220px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        
        .month {
            font-size: 28px;
            margin-top: 15px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 5px black;
        }
        
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .popup-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 30px black;
            opacity: 0.1px;
        }
        
        .popup-box img {
            width: 120px;
            height: 100px;
            margin-top: 10px;
        }
        
        h2 {
            color: #ff4081;
        }
    </style>

</head>

<body>

    <div id="root"></div>

    <script type="text/babel">

        function MonthGallery(){ const months=[ "January","February","March","April","May","June", "July","August","September","October","November","December" ]; const images=[ "https://picsum.photos/id/1011/400/300", "https://picsum.photos/id/1025/400/300",
        "https://picsum.photos/id/1035/400/300", "https://picsum.photos/id/1041/400/300", "https://picsum.photos/id/1050/400/300", "https://picsum.photos/id/1062/400/300", "https://picsum.photos/id/1074/400/300", "https://picsum.photos/id/1084/400/300",
        "https://picsum.photos/id/1080/400/300", "https://picsum.photos/id/109/400/300", "https://picsum.photos/id/110/400/300", "https://picsum.photos/id/111/400/300" ]; const [index,setIndex]=React.useState(0); const [showPopup,setShowPopup]=React.useState(false);
        React.useEffect(()=>{ if(index
        < months.length){ const timer=setTimeout(()=>{ setIndex(prev => prev + 1); },1000); return ()=>clearTimeout(timer); }else{ setShowPopup(true); } },[index]); return(

            <div className="container">

                {index
                < months.length && ( <div>

                    <img src={images[index]} />

                    <div className="month">
                        {months[index]}
                    </div>

            </div>

            )} {showPopup && (

            <div className="popup">

                <div className="popup-box">

                    <h2>🎉 Happy Birthday 🎂</h2>

                    <p>
                        Wishing you happiness, joy and success. May your year be filled with beautiful moments!
                    </p>

                    <img src="https://bentocakesnoida.in/cdn/shop/files/Delicious_Chocolate_Birthday_Cake_with_Decorative_Toppings.jpg?v=1741779005&width=1400" />

                </div>

            </div>

            )}

            </div>

            ); } function App(){ return (
            <div>
                <MonthGallery/>
            </div>
            ); } const root = ReactDOM.createRoot(document.getElementById("root")); root.render(
            <App/>);

    </script>

</body>

</html>
