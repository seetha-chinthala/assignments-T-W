<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="d1"></h1>
    <script>
        var p = +prompt();
        if (p % 2 == 0) {
            // console.log("Even");
            document.getElementById("d1").innerText = "Even"
        } else {
            document.getElementById("d1").innerText = "Odd"
        }
    </script>
</body>

</html>
