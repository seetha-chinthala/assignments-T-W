<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Point Of Sale</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 10px;
        }
        
        h1 {
            margin-bottom: 10px;
        }
        
        #ecom {
            display: flex;
            gap: 20px;
        }
        
        #products {
            display: flex;
            flex-wrap: wrap;
            width: 70%;
            gap: 15px;
        }
        
        .card {
            width: 180px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        
        .card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }
        
        .card button {
            background: #198754;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .qty-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .qty-box button {
            background: black;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
        }
        
        #cart {
            width: 30%;
            border-left: 2px solid #eee;
            padding-left: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            padding: 6px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        
        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Point Of Sale</h1>

    <div id="ecom">

        <!-- PRODUCTS -->
        <div id="products"></div>

        <!-- CART -->
        <div id="cart">
            <h2>Cart</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>
            <div class="total" id="grandTotal">Total: $0</div>
        </div>

    </div>

    <script>
        let cart = [];

        function getProducts() {
            axios.get("https://dummyjson.com/products?limit=12")
                .then(res => renderProducts(res.data.products));
        }

        function renderProducts(products) {
            const productsDiv = document.getElementById("products");
            productsDiv.innerHTML = "";

            products.forEach(p => {
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                <img src="${p.thumbnail}">
                <h4>${p.title}</h4>
                <p>$${p.price}</p>
                <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
            `;
                productsDiv.appendChild(card);
            });
        }

        function addToCart(product) {
            const found = cart.find(i => i.id === product.id);

            if (found) {
                found.qty++;
            } else {
                cart.push({
                    id: product.id,
                    title: product.title,
                    price: product.price,
                    qty: 1
                });
            }
            renderCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;

            if (item.qty === 0) {
                cart = cart.filter(i => i.id !== id);
            }
            renderCart();
        }

        function renderCart() {
            const cartBody = document.getElementById("cartBody");
            cartBody.innerHTML = "";
            let total = 0;

            cart.forEach(item => {
                const row = document.createElement("tr");
                const itemTotal = item.qty * item.price;
                total += itemTotal;

                row.innerHTML = `
                <td>${item.title}</td>
                <td>
                    <button onclick="changeQty(${item.id}, -1)">−</button>
                    ${item.qty}
                    <button onclick="changeQty(${item.id}, 1)">+</button>
                </td>
                <td>${item.price}</td>
                <td>${itemTotal.toFixed(2)}</td>
            `;
                cartBody.appendChild(row);
            });

            document.getElementById("grandTotal").innerText = "Total: $" + total.toFixed(2);
        }

        getProducts();
    </script>

</body>

</html>
