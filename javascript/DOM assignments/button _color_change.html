<!DOCTYPE html>
<html>

<head>
    <title>Button Color Toggle</title>
    <style>
        #myBtn {
            background-color: black;
            /* original color */
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .active {
            background-color: green;
            /* changed color */
        }
    </style>
</head>

<body>

    <button id="myBtn">Click Me</button>

    <script>
        var btn = document.getElementById("myBtn");
        btn.addEventListener("click", () => {
            btn.classList.toggle("active");
        });
    </script>

</body>

</html>
