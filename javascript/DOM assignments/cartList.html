<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Basic POS</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }
        
        h1 {
            text-align: center;
        }
        
        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }
        
        .products,
        .cart {
            background: white;
            padding: 15px;
            width: 50%;
            border-radius: 5px;
        }
        
        .product {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        
        button:hover {
            background: #1e40af;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            border: 1px solid #ccc;
            padding: 5px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>POS System</h1>

    <div class="container">

        <!-- Products -->
        <div class="products">
            <h2>Products</h2>
            <div id="productList"></div>
        </div>

        <!-- Cart -->
        <div class="cart">
            <h2>Cart</h2>
            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>

            <h3>Total: ₹<span id="total">0</span></h3>
        </div>

    </div>

    <script>
        // Product data
        var products = [{
            id: 1,
            name: "Coffee",
            price: 100
        }, {
            id: 2,
            name: "Tea",
            price: 50
        }, {
            id: 3,
            name: "Burger",
            price: 150
        }, {
            id: 4,
            name: "Sandwich",
            price: 120
        }];

        var cart = [];

        // Display products
        var productList = document.getElementById("productList");

        products.forEach(function(p) {
            var div = document.createElement("div");
            div.className = "product";

            div.innerHTML =
                "<span>" + p.name + " - ₹" + p.price + "</span>" +
                "<button onclick='addToCart(" + p.id + ")'>Add</button>";

            productList.appendChild(div);
        });

        // Add to cart
        function addToCart(id) {
            var product = products.find(function(p) {
                return p.id === id;
            });

            var item = cart.find(function(c) {
                return c.id === id;
            });

            if (item) {
                item.qty++;
            } else {
                cart.push({...product,
                    qty: 1
                });
            }

            renderCart();
        }

        // Render cart
        function renderCart() {
            var cartBody = document.getElementById("cartBody");
            var total = 0;
            cartBody.innerHTML = "";

            cart.forEach(function(item, index) {
                total += item.price * item.qty;

                cartBody.innerHTML +=
                    "<tr>" +
                    "<td>" + item.name + "</td>" +
                    "<td>" + item.qty + "</td>" +
                    "<td>₹" + item.price * item.qty + "</td>" +
                    "<td><button onclick='removeItem(" + index + ")'>X</button></td>" +
                    "</tr>";
            });

            document.getElementById("total").innerText = total;
        }

        // Remove item
        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }
    </script>
</body>

</html>
