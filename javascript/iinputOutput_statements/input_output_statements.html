<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // group all statements

        // print ouput of 10 +20 in console
        console.log(10 + 20);

        //output of hello+100 in console
        console.log("Hello+100");

        //print hello edupoly in console
        console.log("Hello edupoly");

        //print error as hello edupoly
        console.error("Hello edupoly");

        //print hello edupolt as warning
        console.warn("Hello edupoly");

        //print hello edupoly as assert
        console.assert(true == false, "Hello edupoly");


        //print edupoly in document
        document.write("Hello edupoly");

        //use prompt to take input
        num = prompt("enter a message");
        console.log("entered message is", num);
    </script>
</body>

</html>
