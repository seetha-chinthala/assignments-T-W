<!DOCTYPE html>
<html>

<head>
    <title>Products Table</title>
    <style>
        table {
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        
        th,
        td {
            border: 1px solid black;
            padding: 6px 12px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>Product Details</h2>
    <div id="output"></div>

    <script>
        var products = [{
            name: "Duracell - AAA Batteries (4-Pack)",
            type: "HardGood",
            price: 5.49,
            category: "Household Batteries",
            manufacturer: "Duracell"
        }, {
            name: "Hard Rock TrackPak - Mac",
            type: "Software",
            price: 29.99,
            category: "Recording Equipment",
            manufacturer: "Hal Leonard"
        }, {
            name: "Duracell - AA 1.5V CopperTop Batteries (4-Pack)",
            type: "HardGood",
            price: 5.62,
            category: "Household Batteries",
            manufacturer: "Duracell"
        }, {
            name: "Energizer - MAX Batteries AA (4-Pack)",
            type: "HardGood",
            price: 5.32,
            category: "Household Batteries",
            manufacturer: "Energizer"
        }, {
            name: "METRA - Antenna Cable Adapter - Black",
            type: "HardGood",
            price: 13.99,
            category: "Antennas & Adapters",
            manufacturer: "Metra"
        }, {
            name: "WipeDrive Six - Mac|Windows",
            type: "Software",
            price: 23.99,
            category: "Maintenance Software",
            manufacturer: "White Canyon"
        }];

        function createTable(title, headers, data, rowCallback) {
            var container = document.getElementById("output");

            var h3 = document.createElement("h3");
            h3.innerText = title;
            container.appendChild(h3);

            var table = document.createElement("table");
            var tr = document.createElement("tr");

            headers.forEach(function(h) {
                var th = document.createElement("th");
                th.innerText = h;
                tr.appendChild(th);
            });
            table.appendChild(tr);

            data.forEach(function(item) {
                var row = document.createElement("tr");
                rowCallback(item, row);
                table.appendChild(row);
            });

            container.appendChild(table);
        }

        /* 1. Display all products */
        createTable(
            "All Products", ["Name", "Type", "Price", "Category", "Manufacturer"],
            products,
            function(p, row) {
                row.innerHTML =
                    `<td>${p.name}</td>
       <td>${p.type}</td>
       <td>${p.price}</td>
       <td>${p.category}</td>
       <td>${p.manufacturer}</td>`;
            }
        );

        /* 2. Display only name and price */
        createTable(
            "Product Name & Price", ["Name", "Price"],
            products,
            function(p, row) {
                row.innerHTML = `<td>${p.name}</td><td>${p.price}</td>`;
            }
        );

        /* 3. Products in ascending order of price */
        var sortedProducts = products.slice().sort(function(a, b) {
            return a.price - b.price;
        });

        createTable(
            "Products Sorted by Price (Ascending)", ["Name", "Type", "Price"],
            sortedProducts,
            function(p, row) {
                row.innerHTML = `<td>${p.name}</td><td>${p.type}</td><td>${p.price}</td>`;
            }
        );

        /* 4. HardGoods and Software separately */
        var hardGoods = [];
        var software = [];

        for (var i = 0; i < products.length; i++) {
            if (products[i].type === "HardGood") {
                hardGoods.push(products[i]);
            } else if (products[i].type === "Software") {
                software.push(products[i]);
            }
        }

        createTable(
            "HardGoods", ["Name", "Price", "Manufacturer"],
            hardGoods,
            function(p, row) {
                row.innerHTML = `<td>${p.name}</td><td>${p.price}</td><td>${p.manufacturer}</td>`;
            }
        );

        createTable(
            "Software", ["Name", "Price", "Manufacturer"],
            software,
            function(p, row) {
                row.innerHTML = `<td>${p.name}</td><td>${p.price}</td><td>${p.manufacturer}</td>`;
            }
        );
    </script>

</body>

</html>
