<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        
        th,
        td {
            border: 1px solid black;
            padding: 6px 12px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h2>Products Information</h2>
    <div id="output">

    </div>
    <script>
        var products = [

            {

                "name": "Duracell - AAA Batteries (4-Pack)",

                "type": "HardGood",

                "price": 5.49,

                "category": "Household Batteries",

                "manufacturer": "Duracell",

            },

            {

                "name": "Hard Rock TrackPak - Mac",

                "type": "Software",

                "price": 29.99,

                "category": "Recording Equipment",

                "manufacturer": "Hal Leonard",

            },

            {

                "name": "Duracell - AA 1.5V CopperTop Batteries (4-Pack)",

                "type": "HardGood",

                "price": 5.62,

                "category": "Household Batteries",

                "manufacturer": "Duracell",

            },

            {

                "name": "Energizer - MAX Batteries AA (4-Pack)",

                "type": "HardGood",

                "price": 5.32,

                "category": "Household Batteries",

                "manufacturer": "Energizer",

            },

            {

                "name": "METRA - Antenna Cable Adapter - Black",

                "type": "HardGood",

                "price": 13.99,

                "category": "Antennas & Adapters",

                "manufacturer": "Metra",

            },

            {

                "name": "WipeDrive Six - Mac|Windows",

                "type": "Software",

                "price": 23.99,

                "category": "Maintenance Software",

                "manufacturer": "White Canyon",

            }

        ];

        function createTable(title, conditionFn) {
            var container = document.getElementById("output");

            var heading = document.createElement("h3");
            heading.innerText = title;
            container.appendChild(heading);

            var table = document.createElement("table");
            var headerRow = document.createElement("tr");

            var headers = ["Name", "Type", "Price", "Category", "Manufacturer"];
            for (var h of headers) {
                var th = document.createElement("th");
                th.innerText = h;
                headerRow.appendChild(th);
            }
            table.appendChild(headerRow);

            for (var i = 0; i < products.length; i++) {
                if (conditionFn(products[i])) {
                    var row = document.createElement("tr");

                    for (var key in products[i]) {
                        var td = document.createElement("td");
                        td.innerText = products[i][key];
                        row.appendChild(td);
                    }

                    table.appendChild(row);
                }
            }

            container.appendChild(table);
        }

        /* 1. All people */
        createTable("All People", function() {
            return true;
        });

        /* 4. dissplay hardware goods and software good separetly in table*/
        createTable("HardWare goods ", function(p) {
            return p.type == "hardware";
        });

        createTable("software goods", function(p) {
            return p.type == "software";
        });
    </script>
</body>

</html>
