<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // print 1to 10 numbers using while loop
        var i = 1;
        while (i <= 10) {
            console.log(i);
            i++;
        }

        // print 10 to 1 using while loop
        j = 10
        while (j > 0) {
            console.log(j);
            j--;
        }

        //print 5 to 15 numbers using while loop
        var k = 5
        while (k <= 15) {
            console.log(k);
            k++;
        }

        //print 1 to 10 using for loop
        for (var i = 1; i <= 10; i++)
            console.log(i);

        //print numbers from 1 to input number
        var num = +prompt("enter range upto num ")
        for (var i = 1; i <= num; i++) {
            console.log(i)
        }

        //print squares from 1 to 10
        console.log("squares")
        for (var i = 1; i <= 10; i++) {
            console.log(i ** 2)
        }

        //print cubes from 1 to 10
        console.log("cubes")
        for (var i = 1; i <= 10; i++) {
            console.log(i ** 3)
        }

        //print digits of given number
        var num1 = +prompt("enter num")
        console.log("dihits in the given ", num1, "are");
        while (num1 > 0) {
            digit = num1 % 10
            console.log(digit)
            num1 = Math.floor(num1 / 10);
        }
    </script>
</body>

</html>
