        //find lcm and gcd
        function gcd(a, b) {
            while (b !== 0) {
                let temp = b;
                b = a % b;
                a = temp;
            }
            return a;
        }

        function lcm(a, b) {
            if (a === 0 || b === 0) {
                return 0;
                return Math.abs(a * b) / gcd(a, b);
            }
