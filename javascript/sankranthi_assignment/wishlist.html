<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>

    <style>
        body {
            font-family: Arial;
            margin: 10px;
        }
        
        #wishlist {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .card {
            width: 180px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        
        img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }
        
        button {
            margin: 4px;
            padding: 6px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Wishlist</h1>
    <a href="index.html">Home</a>

    <div id="wishlist"></div>

    <script>
        let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function saveCart() {
            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function renderWishlist() {
            const container = document.getElementById("wishlist");
            container.innerHTML = "";

            wishlist.forEach(p => {
                container.innerHTML += `
            <div class="card">
                <img src="${p.thumbnail}">
                <h4>${p.title}</h4>
                <p>$${p.price}</p>
                <button onclick="addToCart(${p.id})">Add to Cart</button>
                <button onclick="removeWish(${p.id})">Remove ❤️</button>
            </div>
        `;
            });
        }

        function addToCart(id) {
            const product = wishlist.find(p => p.id === id);
            const item = cart.find(i => i.id === id);
            item ? item.qty++ : cart.push({...product,
                qty: 1
            });
            saveCart();
            alert("Added to cart");
        }

        function removeWish(id) {
            wishlist = wishlist.filter(p => p.id !== id);
            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            renderWishlist();
        }

        renderWishlist();
    </script>

</body>

</html>
