<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact App</title>

<style>
body {
    font-family: Arial;
}

label {
    display: inline-block;
    width: 70px;
}

input {
    margin-bottom: 8px;
}

#addBtn {
    background: dodgerblue;
    color: white;
    padding: 8px;
    width: 230px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.sort-search {
    margin: 15px 0;
}

.sort {
    display: inline-block;
    font-size: 18px;
    cursor: pointer;
    margin-right: 20px;
}

.search {
    padding: 5px;
}

.card {
    background: yellow;
    border: 3px solid red;
    width: 380px;
    padding: 15px;
    margin-top: 20px;
    border-radius: 8px;
    position: relative;
}

.card img {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: block;
    margin: auto;
}

.delete {
    position: absolute;
    right: 10px;
    top: 8px;
    color: red;
    font-size: 20px;
    cursor: pointer;
}

.edit {
    position: absolute;
    right: 10px;
    bottom: 10px;
    background: dodgerblue;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<h3>Add Contact</h3>

<label>Name:</label>
<input type="text" id="name"><br>

<label>Number:</label>
<input type="text" id="number"><br>

<label>Email:</label>
<input type="email" id="email"><br>

<label>Image:</label>
<input type="file" id="image"><br><br>

<button id="addBtn" onclick="addContact()">Add Contact</button>

<!-- SORT + SEARCH -->
<div class="sort-search">
    <span class="sort" onclick="sortContacts()">⬇ A<br>⬆ Z</span>
    <input class="search" type="text" placeholder="Search a contact"
           onkeyup="searchContact(this.value)">
</div>

<div id="contacts"></div>

<script>
let editCard = null;

function addContact() {
    const name = document.getElementById("name").value;
    const number = document.getElementById("number").value;
    const email = document.getElementById("email").value;
    const imageFile = document.getElementById("image").files[0];

    if (!name || !number || !email) {
        alert("Please fill all fields");
        return;
    }

    const imgURL = imageFile ? URL.createObjectURL(imageFile) : "";

    // UPDATE
    if (editCard) {
        editCard.querySelector(".cname").innerText = name;
        editCard.querySelector(".cnumber").innerText = number;
        editCard.querySelector(".cemail").innerText = email;
        if (imageFile) editCard.querySelector("img").src = imgURL;

        editCard = null;
        document.getElementById("addBtn").innerText = "Add Contact";
        clearForm();
        return;
    }

    // CREATE
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <span class="delete" onclick="deleteContact(this)">×</span>
        <img src="${imgURL}">
        <p><b>Name:</b> <span class="cname">${name}</span></p>
        <p><b>Number:</b> <span class="cnumber">${number}</span></p>
        <p><b>Email:</b> <span class="cemail">${email}</span></p>
        <button class="edit" onclick="editContact(this)">Edit</button>
    `;

    document.getElementById("contacts").appendChild(card);
    clearForm();
}

function deleteContact(el) {
    if (confirm("Are you sure you want to delete this contact?")) {
        el.parentElement.remove();
    }
}

function editContact(btn) {
    editCard = btn.parentElement;

    document.getElementById("name").value =
        editCard.querySelector(".cname").innerText;
    document.getElementById("number").value =
        editCard.querySelector(".cnumber").innerText;
    document.getElementById("email").value =
        editCard.querySelector(".cemail").innerText;

    document.getElementById("addBtn").innerText = "Update Contact";
}

function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("number").value = "";
    document.getElementById("email").value = "";
    document.getElementById("image").value = "";
}

/* SORT A–Z */
function sortContacts() {
    const container = document.getElementById("contacts");
    const cards = Array.from(container.children);

    cards.sort((a, b) => {
        const nameA = a.querySelector(".cname").innerText.toLowerCase();
        const nameB = b.querySelector(".cname").innerText.toLowerCase();
        return nameA.localeCompare(nameB);
    });

    container.innerHTML = "";
    cards.forEach(c => container.appendChild(c));
}

/* SEARCH */
function searchContact(value) {
    const cards = document.querySelectorAll(".card");
    value = value.toLowerCase();

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(value) ? "block" : "none";
    });
}
</script>

</body>
</html>
