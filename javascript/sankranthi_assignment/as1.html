        <script>
         let   btn1=document.getElementById("btn1")
            btn1.onclick=function(){

                 btn1.innerText="white"

            btn1.style.color="black"
                
                }else{
btn1.innerText="green";
   btn1.style.backgroundColor="green";
   btn1.style.color="black";
 }
   
};
        </script>
    </body>
