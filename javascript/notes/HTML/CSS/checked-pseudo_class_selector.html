<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #d1,
        #d2 {
            display: none;
        }
        
        #d2:checked+#d1 {
            display: block;
        }
    </style>
</head>

<body>
    <label for="d2">
        <span>&#9776;</span>
    </label>
    <input type="checkbox" id="d2">
    <h1 id="d1">Hello Checkbox you are on</h1>


</body>

</html>
