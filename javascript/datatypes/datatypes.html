<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //assign integer
        var num0 = 123;
        console.log(num0);

        //assign octal number
        var octal_num = 0o25;
        console.log(octal_num);

        //assign hexadecimal number
        var hexa_num = 0x10;
        console.log(hexa_num);

        //assign boolean value
        var b = true;
        console.log(b);

        //assign string value
        var str = "seetha";
        console.log(str);

        //assign undefined
        var un = undefined;
        console.log(un);

        //assign null value
        var num = null;
        console.log(num);

        //assign NaN value
        var num2 = NaN;
        console.log(num2);

        //assign array
        var arr = [10, 20, 50, 40];
        console.log(arr);

        //assign object literal
        var ob = {
            name: "seetha",
            age: 17,
            company: "thought works"
        }
        console.log(ob);
    </script>
</body>

</html>
