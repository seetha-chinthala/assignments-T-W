<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0px;
            font-size: 23px;
            background-color: #FFFFFF;
            color: #1E293B;
        }
        
        #navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(63, 62, 62);
            padding: 5px;
            width: 100%;
            position: fixed;
            color: #1E293B;
        }
        
        #navbar {
            background: linear-gradient( 90deg, #F0FDFA, #F5F3FF);
            border-bottom: 1px solid #E5E7EB;
        }
        
        #navbar a:hover {
            color: #38BDF8;
        }
        
        #logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }
        
        #navbar {
            padding-left: 10px;
        }
        
        #logo-container {
            display: flex;
            gap: 30px;
            padding-left: 50px;
        }
        
        #menubar {
            display: flex;
            list-style: none;
            padding-right: 100px;
        }
        
        #menubar li {
            padding-right: 50px;
            gap: 30px;
        }
        
        #menubar li:hover {
            color: rgb(154, 133, 174);
        }
        
        #hamburger,
        #toggle-menu {
            display: none;
        }
        
        @media screen and (max-width:768px) {
            #menubar {
                top: 0px;
                left: 0px;
                width: 100%;
                position: absolute;
                margin-top: 110px;
                background-color: rgb(63, 62, 62);
                color: whitesmoke;
                height: 0px;
                gap: 5px;
                padding-top: 5px;
            }
            #menubar li {
                padding-left: 20%;
            }
            #hamburger {
                display: flex;
            }
            #menubar {
                display: none;
            }
            #toggle-menu:checked~#menubar {
                display: flex;
                flex-direction: column;
                transition: 2s;
                height: 13%;
            }
        }
        /* hero section*/
        
        #ecom {
            display: flex;
            gap: 20px;
            padding: 150px;
        }
        
        #ecom {
            background-color: #F0FDFA;
            /* Ice Mint */
        }
        
        #ecom button {
            background-color: #38BDF8;
            color: white;
            border-radius: 8px;
        }
        
        #ecom button:hover {
            background-color: #0EA5E9;
        }
        
        #products {
            display: flex;
            flex-wrap: wrap;
            width: 80%;
            gap: 15px;
        }
        
        .card {
            width: 180px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        
        .card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }
        
        .add-btn {
            background: #198754;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .qty-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .qty-box button,
        td button {
            background: black;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        
        #cart {
            width: 30%;
            border-left: 2px solid #eee;
            padding-left: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        
        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
        }
        
        #card {
            background-color: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }
        
        #price {
            color: #0EA5E9;
            font-weight: 600;
        }
        
        #footer-section {
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgb(63, 62, 62);
            color: whitesmoke;
            text-align: center;
            padding: 10px 0;
        }
        
        #footer-section {
            background-color: #F5F3FF;
            color: #1E293B;
            border-top: 1px solid #E5E7EB;
        }
        
        #footer-section a:hover {
            color: #38BDF8;
        }
    </style>
</head>

<body>
    <!--header-->
    <div id="navbar">
        <div id="logo-container">
            <img id="logo" src="https://www.shutterstock.com/shutterstock/photos/2176239313/display_1500/stock-vector-nova-abstract-typography-lettering-modern-creative-premium-logo-design-vector-template-2176239313.jpg">
            <h1 class="logo">Nova Store</h1>
        </div>
        <input type="checkbox" id="toggle-menu">
        <label for="toggle-menu">
            <h1 id="hamburger">&#9776;</h1>
        </label>
        <ul id="menubar">
            <li>Home</li>
            <li>About</li>
            <li>Wishlist</li>
            <li>Contact</li>
        </ul>
    </div>

    <!--products-->
    <div id="ecom">

        <!-- PRODUCTS -->
        <div id="products"></div>

        <!-- CART -->
        <div id="cart">
            <h2>Cart</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>
            <div class="total" id="grandTotal">Total: $0</div>
        </div>

    </div>

    <div id="footer-section">© 2026 Nova Store. All rights reserved.</div>
    <script>
        let productsData = [];
        let cart = [];

        function getProducts() {
            axios.get("https://dummyjson.com/products?")
                .then(res => {
                    productsData = res.data.products;
                    renderProducts();
                });
        }

        function renderProducts() {
            const productsDiv = document.getElementById("products");
            productsDiv.innerHTML = "";

            productsData.forEach(p => {
                const cartItem = cart.find(i => i.id === p.id);
                const card = document.createElement("div");
                card.className = "card";

                let controls = `
<button type="button" class="add-btn" onclick="addToCart(${p.id})">
    Add to Cart
</button>
`;


                if (cartItem) {
                    controls = `
                <div class="qty-box">
                    <button onclick="changeQty(${p.id}, -1)">-</button>
                    <span>${cartItem.qty}</span>
                    <button onclick="changeQty(${p.id}, 1)">+</button>
                </div>
            `;
                }

                card.innerHTML = `
            <img src="${p.thumbnail}">
            <h4>${p.title}</h4>
            <p>$${p.price}</p>
            ${controls}
        `;

                productsDiv.appendChild(card);
            });
        }

        function addToCart(id) {
            const product = productsData.find(p => p.id === id);
            const found = cart.find(i => i.id === id);

            if (found) {
                found.qty++;
            } else {
                cart.push({
                    id: product.id,
                    title: product.title,
                    price: product.price,
                    qty: 1
                });
            }
            renderProducts();
            renderCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;

            if (item.qty === 0) {
                cart = cart.filter(i => i.id !== id);
            }
            renderProducts();
            renderCart();

        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            renderProducts();
            renderCart();
        }


        function renderCart() {
            const cartBody = document.getElementById("cartBody");
            cartBody.innerHTML = "";
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.qty * item.price;
                total += itemTotal;

                cartBody.innerHTML += `
            <tr>
                <td>${item.title}</td>
                <td>
                    <button onclick="changeQty(${item.id}, -1)">-</button>
                    ${item.qty}
                    <button onclick="changeQty(${item.id}, 1)">+</button>
                </td>
                <td>${item.price}</td>
                <td>${itemTotal.toFixed(2)}</td>
                <td>
                    <button onclick="removeItem(${item.id})">X</button>
                </td>
            </tr>`;

            });

            document.getElementById("grandTotal").innerText =
                "Total: $" + total.toFixed(2);
        }

        getProducts();
    </script>


</body>

</html>
