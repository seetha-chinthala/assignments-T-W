    <!--    17.Write a program to print unique words and repetitions in a string-->
    <script>
        a = prompt("Enter a string")
        let str = []
        let str2 = []
        ar = a.split(" ")
        for (i = 0; i <= ar.length - 1; i++) {
            if (!str.includes(ar[i])) {
                str.push(ar[i])
            } else {
                str2.push(ar[i])
            }
        }
        console.log("Repition words", str2)
        console.log("Unique words", str)
    </script>
