    <!--   24.Write a program to add hypens(-) between groups of 4 digits in a credit card number-->
    <script>
        a = prompt("Enter a phone number")
        if (a.length === 16 && !isNaN(a)) {
            let r = a.slice(0, 4) + '-' + a.slice(4, 8) + '-' + a.slice(8, 12) + '-' + a.slice(12)
            console.log("The credit card number you entered", r)
        } else {
            console.log("Invalid credit card number")
        }
    </script>
