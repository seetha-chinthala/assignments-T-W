    <!--28.Use a for loop to find the most frequent letter in all animal names.
                    <script>
            var animals = [
              "Lion","Tiger","Elephant","Giraffe","Monkey","Zebra","Kangaroo",
              "Leopard","Cheetah","Rhinoceros","Hippopotamus","Wolf","Fox","Deer",
              "Squirrel","Crocodile","Alligator","Ostrich","Peacock","Eagle",
              "Whale","Octopus","Jellyfish","Starfish"];
            var freq = {};
            var maxChar = '';
            var maxCount = 0;
            for (var i = 0; i < animals.length; i++) {
                var word = animals[i].toLowerCase();
                for (var j = 0; j < word.length; j++) {
                    var ch = word[j];
                    if (ch >= 'a' && ch <= 'z') {
                        freq[ch] = (freq[ch] || 0) + 1;
                        if (freq[ch] > maxCount) {
                            maxCount = freq[ch];
                            maxChar = ch;}
                    }
                }
            }
            console.log("Most frequent letter:", maxChar);
            console.log("Frequency:", maxCount);
            </script>-->
