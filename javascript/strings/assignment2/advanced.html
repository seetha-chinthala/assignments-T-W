    <!--  10.Use a for loop to remove all fruits thatcontain the letter 'o'-->
    <script>
        const fruits = ["Apple", "Banana", "Cherry", "Mango", "Orange", "Grapes"]
        ar = []
        for (i = 0; i <= fruits.length - 1; i++) {
            if (fruits[i].includes("o")) {
                r = fruits[i].replaceAll("o", "")
                ar.push(r)
            } else {
                ar.push(fruits[i])
            }
        }
        console.log("After removing all fruits that contain the letter 'o' is", ar)
    </script>
