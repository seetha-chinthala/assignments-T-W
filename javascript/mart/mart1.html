<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 10px;
        }
        
        #ecom {
            display: flex;
            gap: 20px;
        }
        
        #products {
            display: flex;
            flex-wrap: wrap;
            width: 70%;
            gap: 15px;
        }
        
        .card {
            width: 180px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            position: relative;
        }
        
        .card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }
        
        .add-btn {
            background: green;
            color: white;
            border: none;
            padding: 6px;
            cursor: pointer;
        }
        
        .like-btn {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .liked {
            color: red;
        }
    </style>
</head>

<body>

    <h1>Products</h1>
    <a href="mart_wishlist.html">Wishlist</a>

    <div id="ecom">
        <div id="products"></div>

        <div id="cart">
            <h2>Cart</h2>
            <ul id="cartList"></ul>
        </div>
    </div>

    <script>
        let productsData = [];
        let cart = (localStorage.getItem("cart") || "").split("|").filter(Boolean);
        let wishlist = (localStorage.getItem("wishlist") || "").split("|").filter(Boolean);

        function saveCart() {
            localStorage.setItem("cart", cart.join("|"));
        }

        function saveWishlist() {
            localStorage.setItem("wishlist", wishlist.join("|"));
        }

        function getProducts() {
            axios.get("https://dummyjson.com/products")
                .then(res => {
                    productsData = res.data.products;
                    renderProducts();
                    renderCart();
                });
        }

        function renderProducts() {
            const div = document.getElementById("products");
            div.innerHTML = "";

            productsData.forEach(p => {
                const liked = wishlist.includes(String(p.id));
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
            <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleWishlist(${p.id})">
                ${liked ? '❤️' : '🤍'}
            </button>
            <img src="${p.thumbnail}">
            <h4>${p.title}</h4>
            <p>$${p.price}</p>
            <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        `;
                div.appendChild(card);
            });
        }

        function toggleWishlist(id) {
            id = String(id);
            if (wishlist.includes(id)) {
                wishlist = wishlist.filter(x => x !== id);
            } else {
                wishlist.push(id);
            }
            saveWishlist();
            renderProducts();
        }

        function addToCart(id) {
            id = String(id);
            cart.push(id);
            saveCart();
            renderCart();
        }

        function renderCart() {
            const ul = document.getElementById("cartList");
            ul.innerHTML = "";
            cart.forEach(id => {
                const p = productsData.find(x => x.id == id);
                if (p) ul.innerHTML += `<li>${p.title}</li>`;
            });
        }

        getProducts();
    </script>

</body>

</html>
