<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wishlist</title>

    <style>
        body {
            font-family: Arial;
        }
        
        #wishlist {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .card {
            width: 180px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        
        img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }
        
        button {
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>My Wishlist ❤️</h1>
    <div id="wishlist"></div>


    <script>
        let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
        const container = document.getElementById("wishlist");

        function renderWishlist() {
            container.innerHTML = "";

            wishlist.forEach(p => {
                container.innerHTML += `
            <div class="card">
                <img src="${p.thumbnail}">
                <h4>${p.title}</h4>
                <p>$${p.price}</p>
                <button onclick="removeItem(${p.id})">Remove ❤️</button>
                <button onclick=addToCart(${p.id})">AddToCart</button>
            </div>
        `;
            });
        }

        function removeItem(id) {
            wishlist = wishlist.filter(p => p.id !== id);
            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            renderWishlist();
        }

        renderWishlist();
    </script>

</body>

</html>
