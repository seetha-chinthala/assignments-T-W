<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 10px;
        }
        
        #ecom {
            display: flex;
            gap: 20px;
        }
        
        #products {
            display: flex;
            flex-wrap: wrap;
            width: 70%;
            gap: 15px;
        }
        
        .card {
            width: 180px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            position: relative;
        }
        
        .card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
        }
        
        .add-btn {
            background: #198754;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .qty-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .qty-box button,
        td button {
            background: black;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        
        #cart {
            width: 30%;
            border-left: 2px solid #eee;
            padding-left: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th,
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        
        .total {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .like-btn {
            position: absolute;
            top: 5px;
            right: 8px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        
        .liked {
            color: red;
        }
    </style>
</head>

<body>

    <h1>Products</h1>
    <a href="wishlist.html" target="_blank"> Wishlist</a>

    <div id="ecom">

        <div id="products"></div>

        <div id="cart">
            <h2>Cart</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Qty</th>
                        <th>Price</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cartBody"></tbody>
            </table>
            <div class="total" id="grandTotal">Total: $0</div>
        </div>

    </div>

    <script>
        let productsData = [];
        let cart = [];

        function getWishlist() {
            return JSON.parse(localStorage.getItem("wishlist")) || [];
        }

        function toggleWishlist(id) {
            let wishlist = getWishlist();
            const product = productsData.find(p => p.id === id);
            const index = wishlist.findIndex(p => p.id === id);

            if (index > -1) {
                wishlist.splice(index, 1);
            } else {
                wishlist.push(product);
            }

            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            renderProducts();
        }

        function getProducts() {
            axios.get("https://dummyjson.com/products")
                .then(res => {
                    productsData = res.data.products;
                    renderProducts();
                });
        }

        function renderProducts() {
            const productsDiv = document.getElementById("products");
            productsDiv.innerHTML = "";
            const wishlist = getWishlist();

            productsData.forEach(p => {
                const cartItem = cart.find(i => i.id === p.id);
                const liked = wishlist.find(w => w.id === p.id);

                let controls = `
                    <button class="add-btn" onclick="addToCart(${p.id})">
                        Add to Cart
                    </button>
                `;

                if (cartItem) {
                    controls = `
                        <div class="qty-box">
                            <button onclick="changeQty(${p.id}, -1)">-</button>
                            <span>${cartItem.qty}</span>
                            <button onclick="changeQty(${p.id}, 1)">+</button>
                        </div>
                    `;
                }

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleWishlist(${p.id})">
                        ${liked ? '❤️' : '🤍'}
                    </button>
                    <img src="${p.thumbnail}">
                    <h4>${p.title}</h4>
                    <p>$${p.price}</p>
                    ${controls}
                `;

                productsDiv.appendChild(card);
            });
        }

        function addToCart(id) {
            const product = productsData.find(p => p.id === id);
            const found = cart.find(i => i.id === id);

            if (found) {
                found.qty++;
            } else {
                cart.push({
                    id: product.id,
                    title: product.title,
                    price: product.price,
                    qty: 1
                });
            }
            renderProducts();
            renderCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.qty += delta;

            if (item.qty === 0) {
                cart = cart.filter(i => i.id !== id);
            }
            renderProducts();
            renderCart();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            renderProducts();
            renderCart();
        }

        function renderCart() {
            const cartBody = document.getElementById("cartBody");
            cartBody.innerHTML = "";
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.qty * item.price;
                total += itemTotal;

                cartBody.innerHTML += `
                    <tr>
                        <td>${item.title}</td>
                        <td>
                            <button onclick="changeQty(${item.id}, -1)">-</button>
                            ${item.qty}
                            <button onclick="changeQty(${item.id}, 1)">+</button>
                        </td>
                        <td>${item.price}</td>
                        <td>${itemTotal.toFixed(2)}</td>
                        <td>
                            <button onclick="removeItem(${item.id})">X</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("grandTotal").innerText =
                "Total: $" + total.toFixed(2);
        }

        getProducts();
    </script>

</body>

</html>
