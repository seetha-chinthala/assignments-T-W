<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            border: 0.5px solid black;
            border-radius: 2px;
            padding: 10px;
        }
        
        .child {
            height: 300px;
            width: 300px;
            position: relative;
            padding: 10px;
        }
        
        .img {
            height: 100%;
            width: 100%;
            border-radius: 15px;
        }
        
        .text {
            width: 250px;
            height: 50px;
            position: absolute;
            top: 40%;
            left: 15%;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }
        
        .new {
            height: 50px;
            width: 50px;
            position: absolute;
            top: 80%;
            left: 20%;
            transform: translate(-50%, -50%);
            border-radius: 50%
        }
        
        .bulb {
            height: 30px;
            width: 30px;
            position: absolute;
            top: 80%;
            left: 60%;
            border-radius: 50%;
        }
        
        p {
            color: white;
            font-size: 10px;
            position: absolute;
            top: 80%;
            left: 70%
        }
    </style>
</head>

<body>
    <h1>Custom Cards</h1>
    <div class="parent">
