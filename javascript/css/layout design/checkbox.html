<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #d2~h1 {
            display: none;
        }
        
        #d2:checked~h1 {
            display: block;
        }
    </style>
</head>

<body>
    <input type="checkbox" id="d2">
    <label for="d2">click me</label>
    <h1>Hello Checkbox you are on</h1>
    <h1>Hi this is seetha</h1>
</body>

</html>
